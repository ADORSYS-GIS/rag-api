<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="820" viewBox="0 0 960 820">
  <defs>
    <!-- Arrow markers -->
    <marker id="arr-amber" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#f7c948"/>
    </marker>
    <marker id="arr-cyan" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arr-green" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arr-slate" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.12" opacity="0.35"/>
    </pattern>

    <!-- Glows -->
    <filter id="glow-green" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-amber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Background ──────────────────────────────────────── -->
  <rect width="960" height="820" fill="#0a0a23"/>
  <rect width="960" height="820" fill="url(#grid)"/>

  <!-- ── Title ───────────────────────────────────────────── -->
  <text x="480" y="40" fill="#ffffff" font-family="'Segoe UI',Arial,sans-serif"
        font-size="23" font-weight="bold" text-anchor="middle" letter-spacing="0.5">
    RAG System — Full Architecture
  </text>
  <text x="480" y="63" fill="#64748b" font-family="'Segoe UI',Arial,sans-serif"
        font-size="12" text-anchor="middle">
    feat/rag-images-and-mcp-perf  ·  rag-api Rust workspace
  </text>

