name: CI/CD

on:
  push: {}
  pull_request: {}

env:
  REGISTRY: ghcr.io
  # Images are published under the repository owner's namespace.
  # e.g. ghcr.io/ADORSYS-GIS/ai-helm/rag-api
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/ai-helm

jobs:
  # ── code quality ─────────────────────────────────────────────────────────────
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install protobuf compiler
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ── tests ─────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install protobuf compiler
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: cargo test
        run: cargo test --workspace

  # ── container builds ─────────────────────────────────────────────────────────
  # Only runs on pushes to main. Builds amd64 + arm64 for each image and
  # publishes to GHCR.
  container-build:
    name: Build & Push — ${{ matrix.image }}
    runs-on: ${{ matrix.runner }}
    needs: test
    if: github.ref == 'refs/heads/feat/rag-images-and-mcp-perf' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # rag-api — amd64
          - image: rag-api
            target: rag-api-runtime
            platform: linux/amd64
            runner: ubuntu-24.04
            tag_suffix: ""
          # rag-api — arm64
          - image: rag-api
            target: rag-api-runtime
            platform: linux/arm64
            runner: ubuntu-22.04-arm
            tag_suffix: "-arm64"
          # legacy-proxy — amd64
          - image: rag-legacy-proxy
            target: legacy-proxy-runtime
            platform: linux/amd64
            runner: ubuntu-24.04
            tag_suffix: ""
          # legacy-proxy — arm64
          - image: rag-legacy-proxy
            target: legacy-proxy-runtime
            platform: linux/arm64
            runner: ubuntu-22.04-arm
            tag_suffix: "-arm64"
          # rag-mcp — amd64
          - image: rag-mcp
            target: rag-mcp-runtime
            platform: linux/amd64
            runner: ubuntu-24.04
            tag_suffix: ""
          # rag-mcp — arm64
          - image: rag-mcp
            target: rag-mcp-runtime
            platform: linux/arm64
            runner: ubuntu-22.04-arm
            tag_suffix: "-arm64"

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=,suffix=${{ matrix.tag_suffix }},format=short
            type=raw,value=latest${{ matrix.tag_suffix }},enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_IMAGE_SRC: remote
          TRIVY_PLATFORM: ${{ matrix.platform }}
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
